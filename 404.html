<!doctype html>
<html lang="en">
<head>

<body>

    <h1>This glass is empty.</h1>
    <p>The page you're after doesn't exist — maybe it was drunk in a previous edition.</p>
    <p><a class="btn btn-primary" href="/">Back to the bar</a></p>

  <script>
    (function () {
      var c = document.getElementById("clink404");
      c.addEventListener("click", function () {
        c.classList.remove("play");
        void c.offsetWidth;
        c.classList.add("play");
      });
    })();
  </script>
